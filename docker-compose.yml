services:
  postgres:
    image: postgres:16-alpine
    container_name: my-master-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: my_master_api
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d my_master_api']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: development
    container_name: my-master-api-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_PORT: ${APP_PORT}
      DATABASE_URL: postgresql://app:app@postgres:5432/my_master_api?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '${APP_PORT}:${APP_PORT}'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "yarn install --frozen-lockfile && yarn prisma:generate && yarn start:dev"
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./prisma
          target: /app/prisma
        - action: rebuild
          path: package.json
        - action: rebuild
          path: yarn.lock
        - action: rebuild
          path: Dockerfile

volumes:
  postgres_data:
